<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1C1C1E" />
  <meta name="description" content="날짜별로 먹은 요리를 사진과 함께 기록" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="요리조리" />
  <title>요리조리</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" sizes="180x180" />
</head>
<body>
  <div id="app">
    <section id="view-onboarding" class="view" aria-hidden="true"></section>
    <section id="view-calendar" class="view" aria-hidden="true"></section>
    <section id="view-day" class="view" aria-hidden="true"></section>
    <section id="view-form" class="view" aria-hidden="true"></section>

    <button type="button" id="fab" class="fab" aria-label="오늘 요리 추가">+</button>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true">
    <div class="toast-sprite" aria-hidden="true">
      <div class="toast-strip"></div>
    </div>
    <div class="toast-text">
      <strong>저장했어요</strong>
      <span>캘린더에 반영됐어요</span>
    </div>
  </div>

  <input type="file" id="file-photo" accept="image/*" multiple hidden />

  <script src="js/app.js" defer></script>
</body>
</html>
